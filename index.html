<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Döviz Çevirici</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #334155; color: white; }
        button { background: #e9455c; cursor: pointer; font-weight: bold; }
        #sonuc { font-size: 1.5em; color: #818cf8; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Döviz Çevirici</h2>
    <input type="number" id="miktar" value="1">
    <select id="from"><option value="USD">USD</option><option value="EUR">EUR</option><option value="TRY">TRY</option></select>
    <select id="to"><option value="TRY">TRY</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
    <button onclick="cevir()">HESAPLA</button>
    <div id="sonuc">Sonuç bekleniyor...</div>
</div>

<script>
    async function cevir() {
        const miktar = document.getElementById('miktar').value;
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const sonucDiv = document.getElementById('sonuc');

        sonucDiv.innerText = "Yükleniyor...";

        try {
            // Yeni ve çok daha kararlı API servisi
            const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await res.json();
            
            if (data.result === "success") {
                const kur = data.rates[to];
                const toplam = (miktar * kur).toFixed(2);
                sonucDiv.innerHTML = `${toplam} ${to}`;
            } else {
                sonucDiv.innerText = "API Hatası!";
            }
        } catch (e) {
            sonucDiv.innerText = "Bağlantı başarısız.";
        }
    }
</script>
</body>
</html>
