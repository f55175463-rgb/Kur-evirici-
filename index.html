<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kur Akışı — Canlı Döviz Çevirici</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --ink: #0b0f1a; --ink-2: #121a2b; --ink-3: #1a2338; --paper: #f3ecd9; --gold: #c9a227; --text: #ece6d6; --text-dim: #9aa1b8; --line: rgba(201,162,39,0.22); --radius: 18px; }
  body{ margin:0; background: var(--ink); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .wrap{ max-width: 1080px; margin: 0 auto; padding: 40px 24px; text-align: center; }
  
  /* --- ANİMASYONLAR --- */
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(201,162,39,0.1); } 50% { box-shadow: 0 0 30px rgba(201,162,39,0.4); } 100% { box-shadow: 0 0 10px rgba(201,162,39,0.1); } }
  
  header h1 { animation: slideUp 0.8s ease-out; font-size: 36px; margin-bottom: 5px; }
  header p { animation: slideUp 1s ease-out; color: var(--text-dim); margin-top: 0; }
  
  /* --- ÇEVİRİCİ KUTUSU --- */
  .converter{ background: linear-gradient(180deg, var(--ink-2), var(--ink-3)); border: 1px solid var(--line); border-radius: var(--radius); padding: 34px; max-width: 500px; margin: 30px auto; animation: slideUp 1s ease-out, pulseGlow 3s infinite alternate; transition: transform 0.3s; }
  .converter:hover { transform: scale(1.02); }
  
  .amount-row input{ width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 12px; padding: 15px; color: var(--paper); font-family: 'IBM Plex Mono', monospace; font-size: 26px; outline: none; transition: 0.3s; text-align: center; }
  .amount-row input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(201,162,39,0.3); }
  
  .swap-grid{ display:grid; grid-template-columns: 1fr 60px 1fr; gap: 15px; align-items: center; margin: 20px 0; }
  .curr-field select{ width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 12px; padding: 15px; color: var(--paper); cursor:pointer; text-align: center; font-size: 16px; font-weight: 600; outline: none; transition: 0.3s; }
  .curr-field select:focus { border-color: var(--gold); }
  
  /* --- DEĞİŞTİRME BUTONU --- */
  .swap-btn{ width: 55px; height: 55px; border-radius: 50%; border: 1px solid var(--gold); background: rgba(201,162,39,0.1); color: var(--gold); cursor: pointer; transition: all 0.5s ease; font-size: 22px; display: flex; align-items: center; justify-content: center; }
  .swap-btn:hover { transform: rotate(180deg); background: rgba(201,162,39,0.3); box-shadow: 0 0 15px rgba(201,162,39,0.5); }
  
  .result-box{ padding: 25px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 14px; margin-top: 20px; transition: 0.3s; }
  #resultValue { font-family: 'IBM Plex Mono', monospace; font-size: 34px; font-weight: 600; color: var(--paper); }
  #resultCode { font-size: 18px; color: var(--gold); margin-left: 5px; }
  
  /* --- REKLAM ALANLARI --- */
  .ad-slot{ margin: 30px auto; max-width: 728px; border: 1px dashed var(--line); border-radius: 14px; min-height: 90px; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.02); animation: slideUp 1.2s ease-out; position: relative; padding: 15px; overflow: hidden; }
  .ad-slot::before { content: "SPONSORLU"; position: absolute; top: 5px; left: 10px; font-size: 10px; font-weight: bold; letter-spacing: 1px; color: var(--text-dim); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Kur Akışı 💸</h1>
    <p>Anlık ve Hızlı Döviz Çevirici</p>
  </header>
  
  <!-- 1. ÜST REKLAM ALANI (Banner 300x250) -->
  <div class="ad-slot">
    <script type="text/javascript">
      atOptions = { 'key' : '387e8950129065d36891903404066d18', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/387e8950129065d36891903404066d18/invoke.js"></script>
  </div>

  <div class="converter">
    <div class="amount-row">
      <input id="amountInput" type="number" value="100" placeholder="Miktar girin..." />
    </div>
    <div class="swap-grid">
      <div class="curr-field">
        <select id="fromSelect"></select>
      </div>
      <button class="swap-btn" id="swapBtn">⇄</button>
      <div class="curr-field">
        <select id="toSelect"></select>
      </div>
    </div>
    <div class="result-box">
      <span id="resultValue">Yükleniyor...</span><span id="resultCode">TRY</span>
    </div>
  </div>

  <!-- 2. ORTA REKLAM ALANI (Native Banner) -->
  <div class="ad-slot" style="min-height: 120px; max-width: 900px;">
    <script async="async" data-cfasync="false" src="//pl30393905.effectivecpmnetwork.com/0048a6dafbc34b26744664197b3e96ad/invoke.js"></script>
    <div id="container-0048a6dafbc34b26744664197b3e96ad"></div>
  </div>

  <!-- 3. ALT REKLAM ALANI (Banner 300x250) -->
  <div class="ad-slot">
    <script type="text/javascript">
      atOptions = { 'key' : '387e8950129065d36891903404066d18', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/387e8950129065d36891903404066d18/invoke.js"></script>
  </div>
  
</div>

<script>
(function(){
  const CURRENCIES = ["TRY","USD","EUR","GBP","RUB","CNY","JPY","AZN"];
  const fromSelect = document.getElementById('fromSelect');
  const toSelect = document.getElementById('toSelect');
  const amountInput = document.getElementById('amountInput');
  const resultValue = document.getElementById('resultValue');
  const swapBtn = document.getElementById('swapBtn');
  
  // Seçenekleri doldur
  CURRENCIES.forEach(c => {
    fromSelect.innerHTML += `<option value="${c}">${c}</option>`;
    toSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });
  
  // Varsayılan değerler
  fromSelect.value = "USD";
  toSelect.value = "TRY";

  async function convert() {
    const val = parseFloat(amountInput.value);
    if (isNaN(val) || val <= 0) {
      resultValue.innerText = "0,00";
      return;
    }

    try {
        // Son derece stabil ve CORS hatası vermeyen ExchangeRate-API kullanıyoruz
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/TRY');
        if (!res.ok) throw new Error("API Bağlantı Hatası");
        const data = await res.json();
        
        const fromRate = data.rates[fromSelect.value];
        const toRate = data.rates[toSelect.value];
        
        // TRY tabanından çapraz kur hesaplaması yapıyoruz
        const amountInTry = val / fromRate;
        const finalResult = amountInTry * toRate;
        
        resultValue.innerText = Number(finalResult).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resultCode').innerText = toSelect.value;
    } catch(e) {
        console.error(e);
        resultValue.innerText = "Hata";
    }
  }
  
  // Değişiklikleri dinle
  [fromSelect, toSelect, amountInput].forEach(el => el.addEventListener('input', convert));
  
  // Swap butonu işlevi
  swapBtn.addEventListener('click', () => {
    let temp = fromSelect.value;
    fromSelect.value = toSelect.value;
    toSelect.value = temp;
    convert();
  });
  
  // Sayfa açıldığında ilk çeviriyi yap
  convert();
})();
</script>
</body>
</html>
