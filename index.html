<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Döviz ve Emtia Çevirici</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(233, 69, 96, 0.1);
            padding: 40px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #e9455c;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #a8dadc;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #a8dadc;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #e9455c;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.2);
        }

        input[type="number"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        select {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #e9455c;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.2);
        }

        select option {
            background: #16213e;
            color: #ffffff;
        }

        .swap-button {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e9455c 0%, #d62828 100%);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .swap-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .swap-button:active {
            transform: scale(0.95);
        }

        .result-container {
            background: rgba(233, 69, 96, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-label {
            color: #a8dadc;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            color: #e9455c;
            word-break: break-all;
        }

        .exchange-rate {
            color: #7cced7;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 500;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-primary {
            background: linear-gradient(135deg, #e9455c 0%, #d62828 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .button-primary:active {
            transform: translateY(0);
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #a8dadc;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .button-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #e9455c;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.5);
            color: #51cf66;
        }

        .alert-info {
            background: rgba(23, 162, 184, 0.2);
            border: 1px solid rgba(23, 162, 184, 0.5);
            color: #4dabf7;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #e9455c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history-section {
            border-top: 1px solid rgba(233, 69, 96, 0.2);
            padding-top: 20px;
            margin-top: 20px;
        }

        .history-title {
            color: #a8dadc;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #a8dadc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #e9455c;
        }

        .history-item-value {
            color: #e9455c;
            font-weight: 600;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(233, 69, 96, 0.4);
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: rgba(233, 69, 96, 0.6);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(168, 218, 220, 0.5);
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .result-value {
                font-size: 26px;
            }

            .input-wrapper {
                flex-wrap: wrap;
            }

            select {
                min-width: 100%;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 Döviz Çevirici</h1>
            <p>Gerçek Zamanlı Kur Çevirimi</p>
        </div>

        <div id="alertContainer"></div>

        <div class="input-group">
            <label for="fromAmount">Çevrilecek Miktar</label>
            <input 
                type="number" 
                id="fromAmount" 
                placeholder="0.00" 
                min="0" 
                step="0.01"
                value="1"
            >
        </div>

        <div class="input-group">
            <label>Para Birimleri</label>
            <div class="input-wrapper">
                <select id="fromCurrency">
                    <option value="USD">USD - Dolar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="TRY">TRY - Türk Lirası</option>
                    <option value="GBP">GBP - İngiliz Sterlini</option>
                    <option value="JPY">JPY - Japon Yeni</option>
                    <option value="CHF">CHF - İsviçre Frangı</option>
                    <option value="XAU">XAU - Altın (gram)</option>
                </select>
                <button class="swap-button" id="swapButton" title="Çevrilecek ve Çeviren Para Birimlerini Değiştir">⇄</button>
                <select id="toCurrency">
                    <option value="USD">USD - Dolar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="TRY" selected>TRY - Türk Lirası</option>
                    <option value="GBP">GBP - İngiliz Sterlini</option>
                    <option value="JPY">JPY - Japon Yeni</option>
                    <option value="CHF">CHF - İsviçre Frangı</option>
                    <option value="XAU">XAU - Altın (gram)</option>
                </select>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-label">Çevrilen Tutar</div>
            <div class="result-value" id="resultValue">0.00</div>
            <div class="exchange-rate" id="exchangeRate"></div>
        </div>

        <div class="button-group">
            <button class="button button-primary" id="convertButton">Çevir</button>
            <button class="button button-secondary" id="clearButton">Temizle</button>
        </div>

        <div class="history-section">
            <div class="history-title">Son Çeviriler</div>
            <div class="history-list" id="historyList">
                <div style="color: rgba(168, 218, 220, 0.4); font-size: 12px; text-align: center; padding: 20px 0;">
                    Henüz çevrim işlemi yapılmamıştır
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Frankfurter API ile güncellenen gerçek zamanlı kurlar</p>
        </div>
    </div>

    <script>
        // =====================================================
        // STATE MANAGEMENT
        // =====================================================
        const appState = {
            exchangeRates: {},
            conversionHistory: [],
            goldMultiplier: 65.00,
            maxHistoryItems: 10,
            isLoading: false
        };

        // =====================================================
        // DOM ELEMENTS
        // =====================================================
        const elements = {
            fromAmount: document.getElementById('fromAmount'),
            fromCurrency: document.getElementById('fromCurrency'),
            toCurrency: document.getElementById('toCurrency'),
            swapButton: document.getElementById('swapButton'),
            convertButton: document.getElementById('convertButton'),
            clearButton: document.getElementById('clearButton'),
            resultValue: document.getElementById('resultValue'),
            exchangeRate: document.getElementById('exchangeRate'),
            alertContainer: document.getElementById('alertContainer'),
            historyList: document.getElementById('historyList')
        };

        // =====================================================
        // API FUNCTIONS
        // =====================================================
        async function fetchExchangeRates(baseCurrency = 'USD') {
            try {
                appState.isLoading = true;
                const response = await fetch(
                    `https://api.frankfurter.app/latest?from=${baseCurrency}`
                );

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();
                appState.exchangeRates = data.rates;
                
                showAlert('Kurlar başarıyla güncellendi', 'success');
                return true;
            } catch (error) {
                console.error('Kur çekme hatası:', error);
                showAlert(
                    'Kurlar yüklenemedi. Lütfen bağlantınızı kontrol ederek yeniden deneyin.',
                    'error'
                );
                return false;
            } finally {
                appState.isLoading = false;
            }
        }

        // =====================================================
        // CONVERSION FUNCTIONS
        // =====================================================
        function getConversionRate(fromCurrency, toCurrency) {
            if (fromCurrency === toCurrency) return 1;
            if (fromCurrency === 'XAU') return getGoldToFiatRate(toCurrency);
            if (toCurrency === 'XAU') return 1 / getGoldToFiatRate(fromCurrency);

            if (appState.exchangeRates[toCurrency]) {
                return appState.exchangeRates[toCurrency];
            }

            return null;
        }

        function getGoldToFiatRate(fiatlCurrency) {
            if (fiatlCurrency === 'XAU') return 1;
            const baseRate = appState.exchangeRates['USD'] || 1;
            return appState.goldMultiplier * baseRate;
        }

        function performConversion() {
            const amount = parseFloat(elements.fromAmount.value);
            const fromCurrency = elements.fromCurrency.value;
            const toCurrency = elements.toCurrency.value;

            if (isNaN(amount) || amount < 0) {
                showAlert('Lütfen geçerli bir miktar giriniz', 'error');
                elements.resultValue.textContent = '0.00';
                return;
            }

            if (!appState.exchangeRates || Object.keys(appState.exchangeRates).length === 0) {
                showAlert('Kurlar henüz yüklenmemiştir. Lütfen tekrar deneyin.', 'error');
                return;
            }

            const rate = getConversionRate(fromCurrency, toCurrency);

            if (rate === null) {
                showAlert('Kur bilgisi alınamadı. Lütfen tekrar deneyin.', 'error');
                return;
            }

            const convertedAmount = (amount * rate).toFixed(2);
            elements.resultValue.textContent = convertedAmount;

            const rateDisplay = rate.toFixed(6);
            elements.exchangeRate.textContent = `1 ${fromCurrency} = ${rateDisplay} ${toCurrency}`;

            addToHistory(amount, fromCurrency, convertedAmount, toCurrency, rate);
        }

        // =====================================================
        // HISTORY MANAGEMENT
        // =====================================================
        function addToHistory(fromAmount, fromCurrency, toAmount, toCurrency, rate) {
            const historyEntry = {
                timestamp: new Date().toLocaleTimeString('tr-TR', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                }),
                fromAmount,
                fromCurrency,
                toAmount,
                toCurrency,
                rate
            };

            appState.conversionHistory.unshift(historyEntry);

            if (appState.conversionHistory.length > appState.maxHistoryItems) {
                appState.conversionHistory.pop();
            }

            renderHistory();
        }

        function renderHistory() {
            if (appState.conversionHistory.length === 0) {
                elements.historyList.innerHTML = `
                    <div style="color: rgba(168, 218, 220, 0.4); font-size: 12px; text-align: center; padding: 20px 0;">
                        Henüz çevrim işlemi yapılmamıştır
                    </div>
                `;
                return;
            }

            elements.historyList.innerHTML = appState.conversionHistory
                .map(entry => `
                    <div class="history-item">
                        <span>${entry.fromAmount} ${entry.fromCurrency} → ${entry.toAmount} ${entry.toCurrency}</span>
                        <span class="history-item-value">${entry.timestamp}</span>
                    </div>
                `).join('');
        }

        function clearHistory() {
            appState.conversionHistory = [];
            renderHistory();
            showAlert('Geçmiş temizlendi', 'info');
        }

        // =====================================================
        // UI FUNCTIONS
        // =====================================================
        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.textContent = message;

            elements.alertContainer.innerHTML = '';
            elements.alertContainer.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.classList.remove('show');
                setTimeout(() => alertDiv.remove(), 300);
            }, 4000);
        }

        function swapCurrencies() {
            const temp = elements.fromCurrency.value;
            elements.fromCurrency.value = elements.toCurrency.value;
            elements.toCurrency.value = temp;

            performConversion();
        }

        function clearForm() {
            elements.fromAmount.value = '1';
            elements.resultValue.textContent = '0.00';
            elements.exchangeRate.textContent = '';
            showAlert('Form temizlendi', 'info');
        }

        // =====================================================
        // EVENT LISTENERS
        // =====================================================
        elements.fromAmount.addEventListener('input', performConversion);
        elements.fromAmount.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performConversion();
        });

        elements.fromCurrency.addEventListener('change', performConversion);
        elements.toCurrency.addEventListener('change', performConversion);

        elements.swapButton.addEventListener('click', swapCurrencies);
        elements.convertButton.addEventListener('click', performConversion);
        elements.clearButton.addEventListener('click', clearForm);

        // =====================================================
        // INITIALIZATION
        // =====================================================
        async function initializeApp() {
            showAlert('Kurlar yükleniyor...', 'info');
            const success = await fetchExchangeRates('USD');

            if (success) {
                performConversion();
            }
        }

        // Start the application
        initializeApp();

        // Optional: Refresh rates every 5 minutes
        setInterval(() => {
            fetchExchangeRates('USD');
        }, 300000);
    </script>
</body>
</html>
